<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS - Levántate Mujer</title>

    <!-- Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>

  <body>
    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Login redirect -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

    <script>
  // Tu función original intacta
  function uploadToR2(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();

      reader.onloadend = async () => {
        const base64 = reader.result.split(",")[1];
        try {
          const res = await fetch("/.netlify/functions/upload", {
            method: "POST",
            body: JSON.stringify({
              file: base64,
              name: file.name,
            }),
          });
          const data = await res.json();
          resolve(data.url);
        } catch (error) {
          reject(error);
        }
      };

      reader.readAsDataURL(file);
    });
  }

  // Registramos la librería personalizada en Decap
  CMS.registerMediaLibrary({
    name: 'r2-media',
    init: ({ options, handleInsert }) => {
      return {
        show: () => {
          // Crea un input de archivo oculto cuando el CMS pida una imagen
          const input = document.createElement('input');
          input.type = 'file';
          input.accept = 'image/*';
          
          input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
              // Cambia el cursor para indicar que está cargando
              document.body.style.cursor = 'wait';
              try {
                const url = await uploadToR2(file);
                // Inserta la URL de R2 directamente en el CMS
                handleInsert(url);
              } catch (err) {
                console.error(err);
                alert('Error al subir la imagen a R2');
              } finally {
                document.body.style.cursor = 'default';
              }
            }
          };
          
          // Simula el clic para abrir el explorador de archivos
          input.click();
        },
        enableStandalone: () => true,
      };
    }
  });
</script>
  </body>
</html>
